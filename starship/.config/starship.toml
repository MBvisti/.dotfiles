# Catppuccin Macchiato
format = """
[](crust)\
$directory\
$git_branch\
$git_status\
$fill\
$cmd_duration\
$status\
$line_break\
$character\
"""

palette = "macchiato"

[palettes.macchiato]
base      = "#24273a"
crust     = "#181926"
text      = "#cad3f5"
subtext0  = "#a5adcb"
subtext1  = "#b8c0e0"
surface0  = "#363a4f"
surface1  = "#494d64"
surface2  = "#5b6078"
overlay0  = "#6e738d"
blue      = "#8aadf4"
lavender  = "#b7bdf8"
mauve     = "#c6a0f6"
green     = "#a6da95"
yellow    = "#eed49f"
peach     = "#f5a97f"
red       = "#ed8796"
teal      = "#8bd5ca"
pink      = "#f5bde6"

[character]
success_symbol = "[❯](green)"
error_symbol   = "[❯](red)"
vicmd_symbol   = "[❮](mauve)"

[directory]
style  = "blue"
format = "[$path]($style)[$read_only]($read_only_style)"

[directory.substitutions]
"$HOME"      = "~"
"$HOME/Documents" = "Docs"
"$HOME/Downloads" = "Dls"

[git_branch]
symbol = " "
style  = "peach"
format = "[$symbol$branch]($style)"

[git_status]
style  = "peach"
format = '[$all_status$ahead_behind]($style)'

[cmd_duration]
style  = "yellow"
format = "[$duration]($style)"
min_time = 2000

[status]
style     = "red"
symbol    = "✗"
disabled  = false
format    = "[$symbol$status]($style)"

[fill]
symbol = " "

[golang]
style   = "blue"
format  = "[$symbol$version]($style)"
