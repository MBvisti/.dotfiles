background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 8
    color = rgba(36, 39, 58, 0.5)  /* Base #24273a */
}

input-field {
    monitor =
    size = 280, 44
    outline_thickness = 0
    rounding = 8
    dots_size = 0.2
    dots_spacing = 0.4
    dots_center = true
    outer_color = rgba(198, 160, 246, 0.6)  /* Mauve */
    inner_color = rgba(54, 58, 79, 0.8)      /* Surface 0 */
    font_color = rgba(202, 211, 245, 1.0)    /* Text */
    fade_on_empty = true
    placeholder_text = <i>Password...</i>
    halign = center
    valign = center
    position = 0, -60
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date '+%H:%M')"
    color = rgba(202, 211, 245, 1.0)  /* Text */
    font_size = 72
    font_family = JetBrainsMono Nerd Font
    halign = center
    valign = center
    position = 0, 30
}

label {
    monitor =
    text = cmd[update:1000] echo "$(LC_TIME=en_US.utf8 date '+%A, %d %B')"
    color = rgba(198, 160, 246, 0.8)  /* Mauve */
    font_size = 22
    font_family = JetBrainsMono Nerd Font
    halign = center
    valign = center
    position = 0, 120
}
