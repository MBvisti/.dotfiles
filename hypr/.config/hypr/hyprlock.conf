background {
    monitor =
    path = ~/wallpapers/mesmeric-forest-live.gif
    blur_passes = 2
    blur_size = 6
    color = rgba(30, 30, 46, 1.0)
}

input-field {
    monitor =
    size = 300, 50
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.5
    dots_center = true
    outer_color = rgba(203, 166, 247, 1.0)
    inner_color = rgba(30, 30, 46, 0.6)
    font_color = rgba(205, 214, 244, 1.0)
    fade_on_empty = true
    placeholder_text = <i>Password...</i>
    halign = center
    valign = center
    position = 0, -60
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date '+%H:%M')"
    color = rgba(205, 214, 244, 1.0)
    font_size = 72
    font_family = JetBrainsMono Nerd Font
    halign = center
    valign = center
    position = 0, 60
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date '+%A, %d %B')"
    color = rgba(203, 166, 247, 0.8)
    font_size = 20
    font_family = JetBrainsMono Nerd Font
    halign = center
    valign = center
    position = 0, 100
}
